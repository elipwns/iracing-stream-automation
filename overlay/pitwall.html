<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pit Wall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #f0f4f8;
    width: 400px;
    padding: 8px;
    overflow: hidden;
  }

  #panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 2px;
  }

  /* ── section cards (Glassmorphic) ── */
  .card {
    background: rgba(12, 16, 23, 0.82);
    border: 1px solid rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    transition: all 0.3s ease;
  }

  .card:hover {
    border-color: rgba(0, 229, 255, 0.15);
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #00e5ff;
    text-shadow: 0 0 8px rgba(0, 229, 255, 0.2);
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 6px;
  }

  /* ── track map ── */
  #map-canvas {
    display: block;
    margin: 4px auto 0 auto;
    filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.05));
  }

  /* ── strategy grid ── */
  .strat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .strat-cell {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-left: 3px solid rgba(0, 229, 255, 0.4);
    border-radius: 5px;
    padding: 8px 10px;
    transition: all 0.2s ease;
  }

  .strat-cell:hover {
    background: rgba(0, 229, 255, 0.02);
    border-left-color: #00e5ff;
  }

  .strat-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8fa0b5;
    margin-bottom: 4px;
  }

  .strat-value {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #f0f4f8;
  }

  /* ── recommendation banner ── */
  #rec-banner {
    display: none;
    background: rgba(255, 61, 0, 0.12);
    border: 1px solid rgba(255, 61, 0, 0.4);
    box-shadow: 0 0 15px rgba(255, 61, 0, 0.15), inset 0 0 10px rgba(255, 61, 0, 0.05);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #ff5252;
    margin-bottom: 10px;
    animation: flash-red 2s infinite ease-in-out;
  }

  #rec-banner.fuel { 
    color: #ffc837; 
    border-color: rgba(255, 200, 55, 0.4); 
    background: rgba(255, 200, 55, 0.08); 
    box-shadow: 0 0 15px rgba(255, 200, 55, 0.1), inset 0 0 10px rgba(255, 200, 55, 0.03);
    animation: flash-yellow 2s infinite ease-in-out;
  }
  
  #rec-banner.pace { 
    color: #ff8a65; 
    border-color: rgba(255, 138, 101, 0.4); 
    background: rgba(255, 138, 101, 0.08); 
    box-shadow: 0 0 15px rgba(255, 138, 101, 0.1), inset 0 0 10px rgba(255, 138, 101, 0.03);
    animation: flash-orange 2s infinite ease-in-out;
  }

  @keyframes flash-red {
    0%, 100% { border-color: rgba(255, 61, 0, 0.4); box-shadow: 0 0 10px rgba(255, 61, 0, 0.1); }
    50% { border-color: rgba(255, 61, 0, 0.8); box-shadow: 0 0 20px rgba(255, 61, 0, 0.35); }
  }

  @keyframes flash-yellow {
    0%, 100% { border-color: rgba(255, 200, 55, 0.4); box-shadow: 0 0 10px rgba(255, 200, 55, 0.1); }
    50% { border-color: rgba(255, 200, 55, 0.8); box-shadow: 0 0 20px rgba(255, 200, 55, 0.35); }
  }

  @keyframes flash-orange {
    0%, 100% { border-color: rgba(255, 138, 101, 0.4); box-shadow: 0 0 10px rgba(255, 138, 101, 0.1); }
    50% { border-color: rgba(255, 138, 101, 0.8); box-shadow: 0 0 20px rgba(255, 138, 101, 0.35); }
  }

  /* ── mini relative strip ── */
  .mini-row {
    display: grid;
    grid-template-columns: 28px 1fr 60px;
    align-items: center;
    height: 24px;
    padding: 0 8px;
    border-radius: 4px;
    margin-bottom: 2px;
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: all 0.15s ease;
  }

  .mini-row.player { 
    background: rgba(255, 200, 55, 0.08); 
    border: 1px solid rgba(255, 200, 55, 0.3);
    box-shadow: 0 0 8px rgba(255, 200, 55, 0.1);
  }

  .mini-pos  { 
    font-family: 'Orbitron', monospace;
    font-size: 10px; 
    font-weight: 700;
    color: #8fa0b5; 
    text-align: left; 
  }
  
  .mini-row.player .mini-pos {
    color: #ffc837;
  }

  .mini-name { 
    font-size: 12px; 
    font-weight: 600;
    color: #e8edf2;
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
  }
  
  .mini-gap  { 
    font-family: 'Orbitron', monospace;
    font-size: 11px; 
    font-weight: 700;
    text-align: right; 
    font-variant-numeric: tabular-nums; 
    color: #d1d9e6; 
  }
  
  .mini-row.player .mini-gap { 
    color: #ffc837; 
    text-shadow: 0 0 8px rgba(255, 200, 55, 0.3);
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    flex-shrink: 0;
  }

  #disconnected {
    color: #8fa0b5;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 14px;
    text-align: center;
    text-transform: uppercase;
    animation: breathe 2s infinite ease-in-out;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div id="panel">
  <div id="disconnected" class="card">Waiting for telemetry…</div>

  <!-- track map -->
  <div class="card" id="map-card" style="display:none">
    <div class="card-title">Track Monitor</div>
    <canvas id="map-canvas" width="364" height="176"></canvas>
  </div>

  <!-- strategy -->
  <div class="card" id="strat-card" style="display:none">
    <div class="card-title">Telemetry & Strategy</div>
    <div id="rec-banner"></div>
    <div class="strat-grid">
      <div class="strat-cell">
        <div class="strat-label">Baseline lap</div>
        <div class="strat-value" id="s-baseline">—</div>
      </div>
      <div class="strat-cell">
        <div class="strat-label">Rolling avg (3)</div>
        <div class="strat-value" id="s-rolling">—</div>
      </div>
      <div class="strat-cell">
        <div class="strat-label">Pace Δ</div>
        <div class="strat-value" id="s-delta">—</div>
      </div>
      <div class="strat-cell">
        <div class="strat-label">Fuel laps left</div>
        <div class="strat-value" id="s-fuel">—</div>
      </div>
      <div class="strat-cell">
        <div class="strat-label">Repair time</div>
        <div class="strat-value" id="s-repair">—</div>
      </div>
      <div class="strat-cell">
        <div class="strat-label">Session remain</div>
        <div class="strat-value" id="s-time">—</div>
      </div>
    </div>
  </div>

  <!-- team endurance stats -->
  <div class="card" id="team-card" style="display:none">
    <div class="card-title">Driver & Stint Status</div>
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <div class="strat-label" style="margin:0;">Active Driver</div>
      <div class="strat-value" id="t-active-driver" style="font-size: 14px; color: #00e5ff;">—</div>
    </div>
    <div class="strat-grid">
      <div class="strat-cell">
        <div class="strat-label">Current Stint</div>
        <div class="strat-value" id="t-stint-laps">—</div>
      </div>
      <div class="strat-cell" id="t-fair-share-cell">
        <div class="strat-label">Team Laps</div>
        <div class="strat-value" id="t-total-laps">—</div>
      </div>
    </div>
    <div id="t-driver-breakdown" style="margin-top: 10px; font-size: 10px; color: #8fa0b5; display:flex; flex-direction:column; gap:4px;">
    </div>
  </div>

  <!-- traffic radar -->
  <div class="card" id="radar-card" style="display:none">
    <div class="card-title" style="color: #ff3d00; text-shadow: 0 0 8px rgba(255,61,0,0.3); border-bottom-color: rgba(255,61,0,0.2);">Traffic Radar</div>
    <div id="radar-strip"></div>
  </div>

  <!-- relative timing -->
  <div class="card" id="rel-card" style="display:none">
    <div class="card-title">Relative ±30s</div>
    <div id="mini-strip"></div>
  </div>
</div>

<script>
const WS_URL    = 'ws://localhost:8765';
const GAP_WIN   = 30;

const CLASS_COLORS = {};
function classColor(id) {
  if (!CLASS_COLORS[id])
    CLASS_COLORS[id] = `hsl(${(id * 73) % 360}, 80%, 55%)`;
  return id === 0 ? '#aaaaaa' : CLASS_COLORS[id];
}

function fmtLap(s) {
  if (!s) return '—';
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(3).padStart(6, '0');
  return `${m}:${sec}`;
}

function firstName(full) {
  const p = (full || '').trim().split(' ');
  return p.length > 1 ? p[0][0] + '. ' + p.slice(1).join(' ') : full;
}

function fmtTime(secs) {
  if (!secs || secs < 0) return '—';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ── track map ──────────────────────────────────────────────
const canvas = document.getElementById('map-canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2;
const RX = W * 0.42, RY = H * 0.38;

function pctToXY(pct) {
  const angle = pct * 2 * Math.PI - Math.PI / 2;
  return [CX + RX * Math.cos(angle), CY + RY * Math.sin(angle)];
}

function drawMap(cars) {
  ctx.clearRect(0, 0, W, H);

  // Outer glow of the track
  ctx.beginPath();
  ctx.ellipse(CX, CY, RX, RY, 0, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(0, 229, 255, 0.04)';
  ctx.lineWidth = 14;
  ctx.stroke();

  // Track body (dark roadbed)
  ctx.beginPath();
  ctx.ellipse(CX, CY, RX, RY, 0, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(10, 14, 20, 0.8)';
  ctx.lineWidth = 8;
  ctx.stroke();

  // Futuristic glowing track centerline
  ctx.beginPath();
  ctx.ellipse(CX, CY, RX, RY, 0, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Start/Finish Line
  const [sx, sy] = pctToXY(0);
  ctx.beginPath();
  ctx.moveTo(sx - 8, sy);
  ctx.lineTo(sx + 8, sy);
  ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Draw cars
  for (const car of cars) {
    if (car.lap_pct < 0) continue;
    const [x, y] = pctToXY(car.lap_pct);
    const color = car.is_player ? '#ffc837' : classColor(car.class_id);
    
    // Glowing ring for player
    if (car.is_player) {
      ctx.beginPath();
      ctx.arc(x, y, 9, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255, 200, 55, 0.2)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    
    // Normal car dot
    ctx.beginPath();
    ctx.arc(x, y, car.is_player ? 5.5 : 4.5);
    ctx.fillStyle = color;
    ctx.fill();
    
    // Minor border on other cars
    if (!car.is_player) {
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

// ── main render ────────────────────────────────────────────
function render(data) {
  const disco = document.getElementById('disconnected');
  const mapCard   = document.getElementById('map-card');
  const stratCard = document.getElementById('strat-card');
  const relCard   = document.getElementById('rel-card');
  const teamCard  = document.getElementById('team-card');
  const radarCard = document.getElementById('radar-card');

  if (!data || !data.connected) {
    disco.style.display = 'block';
    mapCard.style.display = stratCard.style.display = relCard.style.display = 'none';
    teamCard.style.display = radarCard.style.display = 'none';
    return;
  }
  disco.style.display = 'none';
  mapCard.style.display = stratCard.style.display = relCard.style.display = '';

  const cars = data.cars || [];
  const st   = data.strategy || {};

  // map
  drawMap(cars);

  // strategy
  const banner = document.getElementById('rec-banner');
  if (st.recommend_pit) {
    banner.style.display = 'block';
    banner.textContent   = '⚠ PIT RECOMMENDED — ' + (st.reason || '');
    banner.className = st.pit_repair_secs > 30 ? 'pace' : st.fuel_laps < 3 ? 'fuel' : 'pace';
  } else {
    banner.style.display = 'none';
  }

  document.getElementById('s-baseline').textContent = fmtLap(st.baseline_lap);
  document.getElementById('s-rolling').textContent  = fmtLap(st.rolling_avg);

  const delta = st.pace_delta;
  const deltaEl = document.getElementById('s-delta');
  deltaEl.textContent = delta != null ? `${delta >= 0 ? '+' : ''}${delta.toFixed(3)}s` : '—';
  deltaEl.style.color = delta > 1.5 ? '#ff5252' : delta > 0.5 ? '#ffc837' : '#00e676';
  if (delta != null) {
    deltaEl.style.textShadow = delta > 1.5 ? '0 0 8px rgba(255, 82, 82, 0.3)' : delta > 0.5 ? '0 0 8px rgba(255, 200, 55, 0.3)' : '0 0 8px rgba(0, 230, 118, 0.3)';
  }

  document.getElementById('s-fuel').textContent   = st.fuel_laps != null ? `${st.fuel_laps} laps` : '—';
  document.getElementById('s-repair').textContent = st.pit_repair_secs > 0 ? `${st.pit_repair_secs}s` : 'None';
  document.getElementById('s-time').textContent   = fmtTime(st.session_time_remain);

  // team endurance
  const ts = data.team_stint;
  if (ts && ts.total_team_laps > 0) {
    teamCard.style.display = '';
    document.getElementById('t-active-driver').textContent = firstName(ts.active_driver) || '—';
    document.getElementById('t-stint-laps').textContent = ts.stint_laps;
    document.getElementById('t-total-laps').textContent = ts.total_team_laps;
    
    const db = document.getElementById('t-driver-breakdown');
    db.innerHTML = '';
    for (const d of ts.driver_laps) {
      const drvRow = document.createElement('div');
      drvRow.style.display = 'flex';
      drvRow.style.justifyContent = 'space-between';
      drvRow.innerHTML = `<span>${firstName(d.name)}</span><span>${d.laps} L (${d.pct}%)</span>`;
      if (d.name === ts.active_driver) drvRow.style.color = '#e8edf2';
      db.appendChild(drvRow);
    }
  } else {
    teamCard.style.display = 'none';
  }

  // traffic radar
  const radarStrip = document.getElementById('radar-strip');
  if (data.traffic_radar && data.traffic_radar.length > 0) {
    radarCard.style.display = '';
    radarStrip.innerHTML = '';
    for (const car of data.traffic_radar) {
      const row = document.createElement('div');
      row.className = 'mini-row';
      row.style.borderColor = 'rgba(255, 61, 0, 0.3)';
      row.style.background = 'rgba(255, 61, 0, 0.05)';

      const pos = document.createElement('div');
      pos.className = 'mini-pos';
      pos.textContent = car.class_name || '';

      const nameWrap = document.createElement('div');
      nameWrap.style.display = 'flex';
      nameWrap.style.alignItems = 'center';
      nameWrap.style.overflow = 'hidden';

      const dot = document.createElement('span');
      dot.className = 'dot';
      const clr = classColor(car.class_id);
      dot.style.background = clr;
      dot.style.boxShadow = `0 0 6px ${clr}`;

      const name = document.createElement('div');
      name.className = 'mini-name';
      name.textContent = firstName(car.name);

      nameWrap.appendChild(dot);
      nameWrap.appendChild(name);

      const gap = document.createElement('div');
      gap.className = 'mini-gap';
      gap.textContent = car.gap_str;
      gap.style.color = '#ff3d00';
      gap.style.textShadow = '0 0 8px rgba(255, 61, 0, 0.3)';

      row.appendChild(pos);
      row.appendChild(nameWrap);
      row.appendChild(gap);
      radarStrip.appendChild(row);
    }
  } else {
    radarCard.style.display = 'none';
  }

  // mini relative
  const strip = document.getElementById('mini-strip');
  strip.innerHTML = '';
  const visible = cars
    .filter(c => c.is_player || (c.gap_secs != null && Math.abs(c.gap_secs) <= GAP_WIN))
    .sort((a, b) => (a.gap_secs ?? 0) - (b.gap_secs ?? 0));

  for (const car of visible) {
    const row = document.createElement('div');
    row.className = 'mini-row' + (car.is_player ? ' player' : '');

    const pos = document.createElement('div');
    pos.className = 'mini-pos';
    pos.textContent = car.position > 0 ? `P${car.position}` : '';

    const nameWrap = document.createElement('div');
    nameWrap.style.display = 'flex';
    nameWrap.style.alignItems = 'center';
    nameWrap.style.overflow = 'hidden';

    const dot = document.createElement('span');
    dot.className = 'dot';
    const clr = classColor(car.class_id);
    dot.style.background = clr;
    dot.style.boxShadow = `0 0 6px ${clr}`;

    const name = document.createElement('div');
    name.className = 'mini-name';
    name.textContent = firstName(car.name);

    nameWrap.appendChild(dot);
    nameWrap.appendChild(name);

    const gap = document.createElement('div');
    gap.className = 'mini-gap';
    gap.textContent = car.is_player ? 'YOU' : car.gap_str;

    row.appendChild(pos);
    row.appendChild(nameWrap);
    row.appendChild(gap);
    strip.appendChild(row);
  }
}

let ws;
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onmessage = e => render(JSON.parse(e.data));
  ws.onclose   = () => {
    document.getElementById('disconnected').style.display = 'block';
    document.getElementById('map-card').style.display = 'none';
    document.getElementById('strat-card').style.display = 'none';
    document.getElementById('rel-card').style.display = 'none';
    document.getElementById('team-card').style.display = 'none';
    document.getElementById('radar-card').style.display = 'none';
    setTimeout(connect, 3000);
  };
  ws.onerror   = () => ws.close();
}
connect();
</script>
</body>
</html>
